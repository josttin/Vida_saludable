<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FitCycle - Tu Tracker de Comidas Libres</title>
    <!-- Relative paths for manifest & icon to support any subfolder host like GitHub Pages (/Finanzas/) -->
    <link rel="manifest" href="./manifest.json" />
    <link rel="icon" type="image/svg+xml" href="./icon.svg" />
    <!-- Updated PWA tags to resolve browser warning -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="FitCycle" />
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./sw.js")
            .then(reg => console.log("SW registrado con éxito", reg))
            .catch(err => console.warn("Error de SW:", err));
        });
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
