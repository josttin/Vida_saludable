name: Deploy FitCycle to GitHub Pages

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js (Node 24)
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies (Fail-safe for missing lockfile)
        run: |
          if [ -f package-lock.json ]; then
            echo "Lockfile found. Running npm ci..."
            npm ci
          else
            echo "Lockfile not found. Falling back to npm install..."
            npm install
          fi

      - name: Build Application
        run: npm run build
        env:
          NODE_ENV: production

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
